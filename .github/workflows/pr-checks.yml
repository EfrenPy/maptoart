name: Pull Request Checks

on:
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

env:
  MAX_LINE_LENGTH: 120

jobs:
  lint-and-validate:
    name: Lint and Validate - ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    continue-on-error: ${{ matrix.python-version == '3.14' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install '.[dev]'
          pip install flake8 pylint mypy

      - name: Validate Python syntax
        run: python -m compileall src/ tests/ -q

      - name: Test CLI help
        run: maptoart-cli --help

      - name: Test list themes
        run: maptoart-cli --list-themes

      - name: Run tests
        run: pytest --cov=maptoart --cov-report=term-missing --cov-fail-under=100

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ tests/ --count --statistics --max-line-length=${{ env.MAX_LINE_LENGTH }}

      - name: Lint with pylint
        run: pylint src/ tests/ --max-line-length=${{ env.MAX_LINE_LENGTH }}
        continue-on-error: true

      - name: Type check with mypy
        run: mypy src/ tests/ --ignore-missing-imports --no-strict-optional

  dependency-check:
    name: Security and Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Audit dependencies with pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
