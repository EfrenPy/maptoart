name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix (example: 0.5.2)"
        required: true
        type: string
      bump_type:
        description: "Semantic bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      run_validation:
        description: "Run lint/type/tests before creating release"
        required: true
        default: true
        type: boolean
      tests_scope:
        description: "Validation test scope"
        required: true
        default: full
        type: choice
        options:
          - full
          - smoke

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        if: ${{ inputs.run_validation }}
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies for validation
        if: ${{ inputs.run_validation }}
        run: |
          uv sync --locked
          uv run python -m pip install --upgrade pip
          uv run python -m pip install flake8 mypy

      - name: Run validation checks
        if: ${{ inputs.run_validation }}
        run: |
          uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          uv run flake8 . --count --statistics --max-line-length=120
          uv run mypy . --ignore-missing-imports --no-strict-optional

      - name: Run full test suite
        if: ${{ inputs.run_validation && inputs.tests_scope == 'full' }}
        run: uv run pytest

      - name: Run smoke tests
        if: ${{ inputs.run_validation && inputs.tests_scope == 'smoke' }}
        run: |
          uv run pytest -o addopts='' \
            tests/test_cli.py::TestMainEntryPoint::test_no_args_prints_examples \
            tests/test_cli.py::TestCLIHelpText::test_help_text_documents_env_vars \
            tests/test_core.py::test_load_theme_from_json \
            tests/test_core.py::TestGeneratePosters::test_single_theme

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import re

          version = os.environ["VERSION"].strip()
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              raise SystemExit(f"Invalid version '{version}'. Use X.Y.Z format.")
          PY

      - name: Ensure tag does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags --force
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists. Choose a new version."
            exit 1
          fi

      - name: Update pyproject and changelog
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          from datetime import date
          from pathlib import Path
          import os
          import re

          version = os.environ["VERSION"].strip()

          pyproject = Path("pyproject.toml")
          changelog = Path("CHANGELOG.md")

          py_text = pyproject.read_text(encoding="utf-8")
          py_text, count = re.subn(
              r'^version\s*=\s*"\d+\.\d+\.\d+"\s*$',
              f'version = "{version}"',
              py_text,
              count=1,
              flags=re.M,
          )
          if count != 1:
              raise SystemExit("Could not update version in pyproject.toml")
          pyproject.write_text(py_text, encoding="utf-8")

          cl_text = changelog.read_text(encoding="utf-8")
          header = f"## [{version}] - {date.today().isoformat()}"
          if header not in cl_text:
              anchor = "and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n"
              idx = cl_text.find(anchor)
              if idx == -1:
                  raise SystemExit("Could not find changelog insertion point")
              idx += len(anchor)
              section = (
                  "\n"
                  f"{header}\n\n"
                  "### Changed\n"
                  "- Describe release changes.\n"
              )
              cl_text = cl_text[:idx] + section + cl_text[idx:]
              changelog.write_text(cl_text, encoding="utf-8")
          PY

      - name: Commit, tag, and push
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No version/changelog changes to commit"
          else
            git commit -m "release: bump to v${VERSION}"
            git push origin main
          fi
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          gh release create "v${VERSION}" \
            --target main \
            --title "v${VERSION}" \
            --notes "Automated ${BUMP_TYPE} release via workflow_dispatch."
